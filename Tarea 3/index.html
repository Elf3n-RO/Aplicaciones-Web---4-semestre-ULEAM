<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Registro de Cliente</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="formulario">
            <h2>Registro de Cliente</h2>

            <div class="alerta" id="alerta">Debe llenar los recuadros, no sea inbecil.</div>
            <label>Cedula</label>
                <input type="text" id="cedula" placeholder="Ej. 1755721626"/>
            <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Ej. Jose Cristo"/>
            <label>Direccion</label>
                <input type="text" id="direccion" placeholder="Ej. Av. Principal 123"/>
            <label>Telefono</label>
                <input type="tel" id="telefono" placeholder="Ej. 0999123456"/>
            <label>Correo Electronico</label>
                <input type="email" id="correo" placeholder="Ej. jose@gmail.com"/>
            <button onclick="validar()">Registrar</button>
        </div>

        <script>
        function validar() {
            const campos = ['cedula','nombre','direccion','telefono','correo'];
            const vacio = campos.some(id => document.getElementById(id).value.trim() === '');

            if (vacio) {
                document.getElementById('alerta').style.display = 'block';
            } 
            else {
                document.getElementById('alerta').style.display = 'none';
                alert('Cliente registrado exitosamente!');
            }
        }
        </script>

    </body>
</html>
